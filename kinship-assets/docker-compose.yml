version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: kinship-postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kinship-assets:
    image: ghcr.io/${IMAGE_NAME}:latest
    container_name: kinship-assets
    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "4000:4000"

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    command: sh -c "npm run migrate && node dist/index.js"

volumes:
  postgres-data:
