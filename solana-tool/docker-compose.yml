version: "3.9"

services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solana_mcp_server_and_client
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npm", "start"]