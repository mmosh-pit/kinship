version: "3.9"

services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solana_mcp_server_and_client
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npm", "start"]
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: live_forge

volumes:
  mongo-data:
